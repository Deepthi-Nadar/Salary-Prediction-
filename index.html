<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Predictor</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at 20% 50%, #3b82f6, transparent 40%),
                radial-gradient(circle at 80% 50%, #8b5cf6, transparent 40%),
                #000;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main hero container */
.hero {
    text-align: center;
    max-width: 700px;
}

/* Big title */
.hero h1 {
    font-size: 60px;
    font-weight: 600;
    margin-bottom: 20px;
}

/* Subtitle */
.hero p {
    font-size: 18px;
    color: #aaa;
    margin-bottom: 40px;
    line-height: 1.5;
}

/* Form box */
.form-box {
    background: rgba(255, 255, 255, 0.05);
    padding: 20px;
    border-radius: 30px;
    display: inline-block;
    backdrop-filter: blur(10px);
}

/* Custom styled select */
select {
    width: 95%;
    padding: 12px 40px 12px 15px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    appearance: none; /* remove default arrow */
    -webkit-appearance: none;
    -moz-appearance: none;
    cursor: pointer;
    font-size: 14px;
    position: relative;
}

/* Custom arrow */
select {
    background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
}

/* Dropdown options (limited styling support) */
option {
    background: #e5e5e5;
    color: black;
}



/* Focus effect */
select:focus {
    box-shadow: 0 0 10px #8b5cf6;
}


/* Make dropdown match dark theme better (partial fix) */
select {
    background-color: rgba(255,255,255,0.08);
    color: white;
}

/* Improve selected option visibility */
option:checked {
    background-color: #2d6cdf;
    color: white;
}

/* Inputs */
input{
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}



/* Button */
button {
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Result */
#result {
    margin-top: 20px;
    font-size: 22px;
    color: #64ffda;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Predict your salary</h1>

    <p>
        Enter your experience and role to estimate your expected salary instantly.
    </p>

    <div class="form-box">
        <input type="number" id="experience" placeholder="Years of Experience">
        
        <select id="job">
            <option value="">Select Job Title</option>
            <option value="Project Manager">Project Manager</option>
            <option value="Machine Learning Engineer">Machine Learning Engineer</option>
            <option value="Web Developer">Web Developer</option>
            <option value="Mobile Developer">Mobile Developer</option>
            <option value="DevOps Engineer">DevOps Engineer</option>
            <option value="Designer">Designer</option>
            <option value="Tester">Tester</option>
            <option value="HR Manager">HR Manager</option>
        </select>

        <br>
        <button onclick="predict()">Predict</button>
    </div>

    <h2 id="result"></h2>
</div>
    <script>
       async function predict() {
    const experience = document.getElementById('experience').value;
    const job = document.getElementById('job').value;

    if (!experience || job === "") {
        document.getElementById("result").innerText = "Please fill all fields";
        return;
    }

    try {
        const response = await fetch('https://salary-prediction-5tjs.onrender.com/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                YearsExperience: Number(experience),
                jobTitle: job
            })
        });

        const data = await response.json();

        document.getElementById("result").innerText = "$" + data["predicted salary is"]

    } catch (error) {
        document.getElementById("result").innerText =
            "Error fetching prediction";
    }
}
    </script>
</body>
</html>
